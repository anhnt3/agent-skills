schema_version: "1.0"

extension:
  id: "dft-speckit"
  name: "DFT Spec Kit Extension"
  version: "1.10.0"
  description: "Bộ command dùng chung của DFT cho Spec Kit — tập hợp các command hỗ trợ quy trình spec-driven development của công ty. Sẽ mở rộng dần nhiều command."
  author: "Nguyen Tuan Anh"
  repository: "https://github.com/dft/agent-skills"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"

provides:
  # Danh sách command dùng chung của DFT — thêm command mới vào đây khi phát sinh.
  commands:
    - name: "speckit.dft-speckit.qa-spec-cycle"
      file: "commands/qa-spec-cycle.md"
      description: "QA trọn vòng từ 1 file spec — sinh testcase thủ công (xlsx 2 sheet), sinh test tự động theo pyramid, tự dựng môi trường và chạy, báo cáo, fix có kiểm soát, ghi ma trận truy vết. Technology-agnostic (đặc thù stack đọc từ .agents/qa-context.md); thay cho command manual-xlsx cũ (Pha 4 của vòng này)."

    - name: "speckit.dft-speckit.road-map-from-codebase"
      file: "commands/road-map-from-codebase.md"
      description: "Lập/cập nhật roadmap build từ codebase — xếp thứ tự từng màn, ghi docs/roadmap.md (không clobber trạng thái/nợ)."

    - name: "speckit.dft-speckit.domain-design"
      file: "commands/domain-design.md"
      description: "Thiết kế/cập nhật domain tổng thể cho một hoặc nhiều module trong roadmap (gom cả danh sách vào 1 doc) — rút entity/FK/enum/rule, ghi docs/domain/<module>.md làm nền cho /speckit.specify từng màn."

  templates:
    - name: "roadmap-template"
      file: "templates/roadmap-template.md"
      description: "Khung cố định cho docs/roadmap.md — bảng tổng thứ tự + khối chi tiết mỗi item (ID/wave/phụ thuộc/trạng thái/nợ)."

    - name: "domain-template"
      file: "templates/domain-template.md"
      description: "Khung cố định cho docs/domain/<module>.md — entity, field chính, FK/quan hệ, enum/error code, rule chung, câu hỏi mở."

tags:
  - dft
  - internal
  - qa
  - testcase
  - xlsx
  - manual-testing

schema_version: "1.0"

extension:
  id: "dft-speckit"
  name: "DFT Spec Kit Extension"
  version: "1.0.1"
  description: "Bộ command dùng chung của DFT cho Spec Kit — tập hợp các command hỗ trợ quy trình spec-driven development của công ty. Sẽ mở rộng dần nhiều command."
  author: "Nguyen Tuan Anh"
  repository: "https://github.com/dft/agent-skills"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"

provides:
  # Danh sách command dùng chung của DFT — thêm command mới vào đây khi phát sinh.
  commands:
    - name: "speckit.dft-speckit.manual-xlsx"
      file: "commands/manual-xlsx.md"
      description: "Sinh testcase thủ công cho tester từ spec/acceptance criteria, xuất CSV rồi XLSX (format cố định)."

tags:
  - dft
  - internal
  - qa
  - testcase
  - xlsx
  - manual-testing

schema_version: "1.0"

preset:
  id: "dft-mstem"
  name: "DFT mSTEM"
  version: "1.6.0"
  description: "Override speckit.specify: business analyst phỏng vấn tuần tự qua AskUserQuestion, khung constitution, wire mock→backend, tiếng Việt."
  author: "Nguyen Tuan Anh"
  repository: "https://github.com/your-org/spec-kit-preset-dft-mstem"
  license: "MIT"

requires:
  # >=0.6.0: bản đầu tiên các preset khác dựa vào để dùng AskUserQuestion trên Claude Code
  speckit_version: ">=0.6.0"

provides:
  templates:
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution.md"
      description: "Ship hiến chương 11 nguyên tắc (Angular mockup → backend ABP); addendum spec/plan tham chiếu đúng bộ này"
      strategy: "replace"

    - type: "template"
      name: "spec-template"
      file: "templates/spec-addendum.md"
      description: "Append mặt Nghiệp vụ (WHAT) của hiến chương + bảng wire mock→backend theo màn"
      strategy: "append"

    - type: "template"
      name: "plan-template"
      file: "templates/plan-addendum.md"
      description: "Append Constitution Check mặt Kỹ thuật (HOW): test, versioning, observability, cơ chế bảo mật/toàn vẹn/tenant"
      strategy: "append"

    - type: "template"
      name: "ui-ux-checklist"
      file: "templates/ui-ux-checklist.md"
      description: "Bộ checklist cố định UI/UX (nguyên tắc IV), CHK001–010 — spec-completeness gate"

    - type: "command"
      name: "speckit.checklist"
      file: "commands/speckit.checklist.md"
      description: "Wrap checklist: fast-path stamp bộ IV cố định + chấm theo spec (tick/gap/N-A có nguồn) + thảo luận vá gap; args khác chạy sinh động core"
      strategy: "wrap"

    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Wrap specify: khảo sát mock + nợ kỹ thuật, phỏng vấn 1 câu/lần theo khung constitution, resolve+ghép addendum, chỉ ghi spec sau khi đạt hiểu chung"
      strategy: "wrap"

    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Wrap plan: bắt buộc resolve+ghép plan addendum (Constitution Check kỹ thuật) trước khi tạo plan.md"
      strategy: "wrap"

tags:
  - "specify"
  - "interview"
  - "vietnamese"
  - "business-analysis"

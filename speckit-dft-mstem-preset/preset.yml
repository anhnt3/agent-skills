schema_version: "1.0"

preset:
  id: "dft-mstem"
  name: "DFT mSTEM"
  version: "2.8.0"
  description: "Override speckit.specify/plan: business analyst phỏng vấn tuần tự qua AskUserQuestion, khung constitution, tiếng Việt. Dùng template mặc định của spec-kit (không còn addendum template)."
  author: "Nguyen Tuan Anh"
  repository: "https://github.com/your-org/spec-kit-preset-dft-mstem"
  license: "MIT"

requires:
  # >=0.6.0: bản đầu tiên các preset khác dựa vào để dùng AskUserQuestion trên Claude Code
  speckit_version: ">=0.6.0"

provides:
  templates:
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution.md"
      description: "Ship hiến chương 11 nguyên tắc (Angular mockup → backend ABP); khung phỏng vấn specify/plan tham chiếu đúng bộ này"
      strategy: "replace"

    - type: "template"
      name: "ui-ux-checklist"
      file: "templates/ui-ux-checklist.md"
      description: "Bộ checklist cố định UI/UX (nguyên tắc IV), CHK001–010 — spec-completeness gate"

    - type: "command"
      name: "speckit.checklist"
      file: "commands/speckit.checklist.md"
      description: "Wrap checklist: fast-path stamp bộ IV cố định + chấm theo spec (tick/gap/N-A có nguồn) + thảo luận vá gap; args khác chạy sinh động core"
      strategy: "wrap"

    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Wrap specify: khảo sát mock + nợ kỹ thuật, phỏng vấn 1 câu/lần theo khung constitution, chỉ ghi spec sau khi đạt hiểu chung. Dùng spec-template mặc định."
      strategy: "wrap"

    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Wrap plan: khảo sát codebase liên quan feature trước khi điền Technical Context. Dùng plan-template mặc định."
      strategy: "wrap"

tags:
  - "specify"
  - "interview"
  - "vietnamese"
  - "business-analysis"

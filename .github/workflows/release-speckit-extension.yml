name: Release dft-speckit extension

# Chạy khi push tag dạng "dft-speckit-v1.0.0".
# Đóng gói speckit-extension/ thành zip chuẩn và tạo GitHub Release kèm asset.
# Sau đó cài bằng:
#   specify extension add dft-speckit --from \
#     https://github.com/<org>/<repo>/releases/download/<tag>/dft-speckit-<version>.zip
on:
  push:
    tags:
      - "dft-speckit-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version để đóng gói (vd 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xác định version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
            tag="dft-speckit-v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#dft-speckit-v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Kiểm tra version khớp extension.yml
        run: |
          manifest_ver="$(grep -E '^[[:space:]]*version:' speckit-extension/extension.yml | head -1 | sed -E 's/.*version:[[:space:]]*"?([^"#]+)"?.*/\1/' | tr -d '[:space:]')"
          if [ "$manifest_ver" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::version trong extension.yml ($manifest_ver) không khớp tag (${{ steps.ver.outputs.version }})"
            exit 1
          fi

      - name: Build zip
        run: |
          chmod +x speckit-extension/build-zip.sh
          speckit-extension/build-zip.sh "${{ steps.ver.outputs.version }}"

      - name: Tạo GitHub Release + upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: dft-speckit ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: speckit-extension/dist/dft-speckit-${{ steps.ver.outputs.version }}.zip

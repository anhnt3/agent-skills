schema_version: "1.0"

preset:
  id: "dft-preset"
  name: "DFT Spec Kit Preset"
  version: "0.0.3"
  description: "Override speckit.constitution/specify/plan theo quy trình BA phỏng vấn tiếng Việt qua AskUserQuestion; replace spec-template + tasks-template để thêm mục 'Đặc tả màn hình' per-screen. Chi tiết xem README."
  author: "Nguyen Tuan Anh"
  repository: "https://github.com/anhnt3/agent-skills"
  license: "MIT"

requires:
  # >=0.6.0: bản đầu tiên các preset khác dựa vào để dùng AskUserQuestion trên Claude Code.
  # Đã kiểm tương thích với spec-kit 0.12.11 (neo section core xác minh nguyên văn —
  # xem docs/research/speckit-addon-review-2026-07-11.md; re-check bằng scripts/check-core-anchors.sh).
  speckit_version: ">=0.6.0"

provides:
  templates:
    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      strategy: "replace"
      description: "Replace spec-template theo kỷ luật một-nhà (chống trùng lặp, Wiegers/29148): 'Thực thể & Từ điển dữ liệu' sở hữu hằng số field, Functional Requirements sở hữu hành vi + business rule, mục per-screen '## Đặc tả màn hình' chỉ mô tả trình bày và TRỎ tới FR/field (không chép). Chỉ nêu yêu cầu bằng lời; cơ chế để plan/tasks lo. Là chỗ /speckit.specify rót kết quả phỏng vấn."

    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template.md"
      strategy: "replace"
      description: "Replace tasks-template: giữ nguyên core (phases theo user story) + mục 'Phủ đặc tả màn hình' nhắc __SPECKIT_COMMAND_TASKS__ sinh đủ task cho từng '### Màn' trong spec (validation/trạng thái/cột/lọc/quyền/xác nhận phá hủy); cơ chế cụ thể do task tự figure out theo stack."

    - type: "command"
      name: "speckit.constitution"
      file: "commands/speckit.constitution.md"
      description: "Wrap constitution: giải thích cơ chế analyze/converge bốc rule set theo MUST; làn A quét codebase rút luật đang cưỡng chế (bắt buộc nêu nguồn), làn B phỏng vấn mong muốn (≤4 lượt AskUserQuestion), hợp nhất hai làn thành ≤7 nguyên tắc; nguyên tắc code chưa đạt ghi 'MUST + miễn trừ' vào Phạm vi áp dụng để converge không sinh bão CRITICAL trên code cũ; cổng tự kiểm chặn cứng (mỗi nguyên tắc ≥1 MUST + Rationale, không placeholder). Core lo semver/Sync Impact Report/propagation."
      strategy: "wrap"

    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Wrap specify: khảo sát repo + nợ kỹ thuật, phỏng vấn theo trục nghiệp vụ (trên màn hình → nghiệp vụ nền) — gom 1–4 câu độc lập/lượt, quyết định trọng yếu hỏi từng câu, thứ yếu đề-xuất-rồi-duyệt-gộp; sổ theo dõi vét cạn persist ra .specify/interviews/; đối chiếu constitution như vòng kiểm; ràng buộc kỹ thuật bàn giao cho plan qua section trong spec.md; rót kết quả GĐ2 vào mục '## Đặc tả màn hình' của spec-template (preset replace)."
      strategy: "wrap"

    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Wrap plan: đọc section 'Ràng buộc kỹ thuật kế thừa' trong spec.md (do specify ghi) làm đầu vào bắt buộc + khảo sát codebase liên quan feature trước khi điền Technical Context. Dùng plan-template mặc định."
      strategy: "wrap"

tags:
  - "specify"
  - "interview"
  - "vietnamese"
  - "business-analysis"
